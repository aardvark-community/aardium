<!DOCTYPE html>
<html lang="en">
<head>
    <style>
        html, body, img {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #000;
            image-rendering: pixelated; /* Works in Chrome, Edge, and Firefox */

        }
    </style>
</head>

    <img src="checker.png">
</body>
</html>
