name: Publish
on:
  push:
    branches:
      - master
    paths:
      - RELEASE_NOTES.md
      - .github/workflows/publish.yml
jobs:
  release-check:
    name: Check release version
    runs-on: windows-latest
    permissions:
      contents: read
    outputs:
      should_publish: ${{ steps.compare.outputs.should_publish }}
      release_notes_version: ${{ steps.compare.outputs.release_notes_version }}
      latest_release_version: ${{ steps.compare.outputs.latest_release_version }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install Dotnet
        uses: actions/setup-dotnet@v5
        with:
          global-json-file: global.json

      - name: Restore Tools
        run: dotnet tool restore

      - name: Compare release versions
        id: compare
        shell: pwsh
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          function Normalize-Version([string] $Version) {
            if ([string]::IsNullOrWhiteSpace($Version)) {
              return ""
            }

            return $Version.Trim() -replace '^[vV]', ''
          }

          $parseOutput = & dotnet aardpack --parse-only
          if ($LASTEXITCODE -ne 0) {
            throw "dotnet aardpack --parse-only failed with exit code $LASTEXITCODE."
          }

          $releaseNotesVersion = ($parseOutput | Where-Object { -not [string]::IsNullOrWhiteSpace($_) } | Select-Object -Last 1).Trim()
          if ([string]::IsNullOrWhiteSpace($releaseNotesVersion)) {
            throw "dotnet aardpack --parse-only did not return a release notes version."
          }

          $headers = @{
            Authorization = "Bearer $env:GITHUB_TOKEN"
            Accept = "application/vnd.github+json"
            "X-GitHub-Api-Version" = "2022-11-28"
            "User-Agent" = "github-actions"
          }

          $latestReleaseVersion = ""
          $shouldPublish = "true"
          try {
            $latestRelease = Invoke-RestMethod `
              -Uri "https://api.github.com/repos/${{ github.repository }}/releases/latest" `
              -Headers $headers
            $latestReleaseVersion = [string] $latestRelease.tag_name

            if ((Normalize-Version $releaseNotesVersion) -eq (Normalize-Version $latestReleaseVersion)) {
              $shouldPublish = "false"
            }
          }
          catch {
            $statusCode = $_.Exception.Response.StatusCode.value__
            if ($statusCode -eq 404) {
              Write-Host "No latest GitHub release found. Continuing publish workflow."
            }
            else {
              throw
            }
          }

          "release_notes_version=$releaseNotesVersion" >> $env:GITHUB_OUTPUT
          "latest_release_version=$latestReleaseVersion" >> $env:GITHUB_OUTPUT
          "should_publish=$shouldPublish" >> $env:GITHUB_OUTPUT

          "## Publish release check" >> $env:GITHUB_STEP_SUMMARY
          "" >> $env:GITHUB_STEP_SUMMARY
          "- Release notes version: ``$releaseNotesVersion``" >> $env:GITHUB_STEP_SUMMARY
          "- Latest GitHub release: ``$latestReleaseVersion``" >> $env:GITHUB_STEP_SUMMARY
          "- Should publish: ``$shouldPublish``" >> $env:GITHUB_STEP_SUMMARY
  mac_arm64:
    name: OSX (arm64)
    needs: release-check
    if: needs.release-check.outputs.should_publish == 'true'
    runs-on: macos-14
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install Dotnet
        uses: actions/setup-dotnet@v5
        with:
          global-json-file: global.json

      - name: Restore Dotnet Tools
        run: dotnet tool restore

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24.15.0'
          cache: 'npm'
          cache-dependency-path: Aardium/package-lock.json

      - name: Install Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11.8'

      - name: Add Cert to Keychain
        uses: apple-actions/import-codesign-certs@v3
        with:
          p12-file-base64: ${{ secrets.MAC_CERT_BASE64 }}
          p12-password: ${{ secrets.MAC_CERT_PASSWORD }}

      - name: Npm Install
        working-directory: Aardium
        run: npm install

      - name: Npm Build
        working-directory: Aardium
        run: npm run build:darwin:arm64
        env:
          MAC_CERT_BASE64: ${{ secrets.MAC_CERT_BASE64 }}
          MAC_CERT_PASSWORD: ${{ secrets.MAC_CERT_PASSWORD }}
          MAC_DEV_PASSWORD: ${{ secrets.MAC_DEV_PASSWORD }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Restore Paket
        run: dotnet paket restore

      - name: Dotnet Build
        run: dotnet build -c Release src/Aardium.sln

      - name: Dotnet Test
        run: dotnet test src/Aardium.sln -c Release --no-build --nologo --logger:"console;verbosity=normal"

      - name: Upload Aardium
        uses: actions/upload-artifact@v7
        with:
          name: mac_arm64
          path: Aardium/dist/Aardium-Darwin-arm64.tar.gz
  mac_x64:
    name: OSX (x64)
    needs: release-check
    if: needs.release-check.outputs.should_publish == 'true'
    runs-on: macos-15-intel
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install Dotnet
        uses: actions/setup-dotnet@v5
        with:
          global-json-file: global.json

      - name: Restore Dotnet Tools
        run: dotnet tool restore

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24.15.0'
          cache: 'npm'
          cache-dependency-path: Aardium/package-lock.json

      - name: Install Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11.8'

      - name: Add Cert to Keychain
        uses: apple-actions/import-codesign-certs@v3
        with:
          p12-file-base64: ${{ secrets.MAC_CERT_BASE64 }}
          p12-password: ${{ secrets.MAC_CERT_PASSWORD }}

      - name: Npm Install
        working-directory: Aardium
        run: npm install

      - name: Npm Build
        working-directory: Aardium
        run: npm run build:darwin:x64
        env:
          MAC_CERT_BASE64: ${{ secrets.MAC_CERT_BASE64 }}
          MAC_CERT_PASSWORD: ${{ secrets.MAC_CERT_PASSWORD }}
          MAC_DEV_PASSWORD: ${{ secrets.MAC_DEV_PASSWORD }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Restore Paket
        run: dotnet paket restore

      - name: Dotnet Build
        run: dotnet build -c Release src/Aardium.sln

      - name: Dotnet Test
        run: dotnet test src/Aardium.sln -c Release --no-build --nologo --logger:"console;verbosity=normal"

      - name: Upload Aardium
        uses: actions/upload-artifact@v7
        with:
          name: mac_x64
          path: Aardium/dist/Aardium-Darwin-x64.tar.gz
  linux_x64:
    name: Linux (x64)
    needs: release-check
    if: needs.release-check.outputs.should_publish == 'true'
    runs-on: ubuntu-22.04
    steps:  
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install Dotnet
        uses: actions/setup-dotnet@v5
        with:
          global-json-file: global.json

      - name: Restore Dotnet Tools
        run: dotnet tool restore

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24.15.0'
          cache: 'npm'
          cache-dependency-path: Aardium/package-lock.json

      - name: Npm Install
        working-directory: Aardium
        run: npm install

      - name: Npm Build
        working-directory: Aardium
        run: npm run build:linux:x64

      - name: Restore Paket
        run: dotnet paket restore

      - name: Dotnet Build
        run: dotnet build -c Release src/Aardium.sln

      - name: Dotnet Test
        run: xvfb-run --auto-servernum dotnet test src/Aardium.sln -c Release --no-build --nologo --logger:"console;verbosity=normal"

      - name: Upload Aardium
        uses: actions/upload-artifact@v7
        with:
          name: linux_x64
          path: Aardium/dist/Aardium-Linux-x64.tar.gz
  win32_x64:
    name: Windows (x64)
    needs: release-check
    if: needs.release-check.outputs.should_publish == 'true'
    runs-on: windows-2022
    steps:  
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install Dotnet
        uses: actions/setup-dotnet@v5
        with:
          global-json-file: global.json

      - name: Restore Dotnet Tools
        run: dotnet tool restore

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24.15.0'
          cache: 'npm'
          cache-dependency-path: Aardium\package-lock.json

      - name: Npm Install
        working-directory: Aardium
        run: npm install

      - name: Npm Build
        working-directory: Aardium
        run: npm run build:win32:x64

      - name: Restore Paket
        run: dotnet paket restore

      - name: Dotnet Build
        shell: cmd
        run: dotnet build -c Release src\Aardium.sln

      - name: Dotnet Test
        run: dotnet test src\Aardium.sln -c Release --no-build --nologo --logger:"console;verbosity=normal"

      - name: Upload Aardium
        uses: actions/upload-artifact@v7
        with:
          name: win32_x64
          path: Aardium/dist/Aardium-win32-x64
  final:
    name: Package
    needs: 
      - mac_arm64
      - mac_x64
      - win32_x64
      - linux_x64
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Download OSX dependencies (x64)
        uses: actions/download-artifact@v8
        with:
          name: mac_x64
          path: Aardium/dist/Aardium-Darwin-x64.tar.gz

      - name: Download OSX dependencies (arm64)
        uses: actions/download-artifact@v8
        with:
          name: mac_arm64
          path: Aardium/dist/Aardium-Darwin-arm64.tar.gz

      - name: Download Linux dependencies (x64)
        uses: actions/download-artifact@v8
        with:
          name: linux_x64
          path: Aardium/dist/Aardium-Linux-x64.tar.gz

      - name: Download Windows dependencies (x64)
        uses: actions/download-artifact@v8
        with:
          name: win32_x64
          path: Aardium\dist\Aardium-win32-x64

      - name: Install Dotnet
        uses: actions/setup-dotnet@v5
        with:
          global-json-file: global.json

      - name: Restore Tools
        run: dotnet tool restore

      - name: Restore
        run: dotnet paket restore

      - name: Pack
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: dotnet aardpack src\Aardium.sln --notag

      - name: Upload Package
        uses: actions/upload-artifact@v7
        with:
          name: packages
          path: bin\pack

      - name: NuGet
        env:
          NUGET_KEY: ${{ secrets.NUGET_KEY }}
        shell: cmd
        run: dotnet nuget push "bin\pack\*.nupkg" -k %NUGET_KEY% -s "https://api.nuget.org/v3/index.json" --skip-duplicate