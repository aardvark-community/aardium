<!DOCTYPE html>
<html lang="en">
<head>
    <style>
        html, body {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: white;
        }

        .color-box {
            position: absolute;
            top: 0;
            left: 0;
            width: 32px;
            height: 32px;
            animation: colorCycle 3s infinite step-end;
        }

        @keyframes colorCycle {
            0% {
                background-color: #ff0000;
            }
            33.33% {
                background-color: #00ff00;
            }
            66.66% {
                background-color: #0000ff;
            }
        }
    </style>
</head>
<body>
    <div class="color-box"></div>
</body>
</html>
